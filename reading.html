<script>
const LORE_QUOTES = [
  { text: "What is preserved, endures. What is taught, multiplies.", attribution: "Maxim of the First Curators" },
  { text: "Time forgets; the record remembers.", attribution: "Frieze, the Great Archive" },
  { text: "A page unread is a page not yet written.", attribution: "Reflection of an Archivist" },
  { text: "Dust is patient, but ink is patient longer.", attribution: "Apocrypha of the Sixth Hall" },
  { text: "The Order does not write history. The Order keeps it.", attribution: "First Lesson of the Pledge" },
  { text: "Knowledge unguarded is knowledge lost.", attribution: "From the Vigil's Charter" },
  { text: "Wisdom unspoken is wisdom unproven.", attribution: "Tutor's Reflection" },
  { text: "A scholar without a question is an archive without a key.", attribution: "Inscription, Reading Hall" },
  { text: "To know one thing well is to suspect ten thousand things rightly.", attribution: "Saying of the Lore Keepers" },
  { text: "Certainty is a door. Curiosity is the room beyond it.", attribution: "Margin note, Untitled Codex" },
  { text: "The greatest archive is the one not yet catalogued.", attribution: "Curator's Lament" },
  { text: "The first duty of the Librarian is to listen.", attribution: "Pledge of the Assembly" },
  { text: "A teacher who does not learn becomes the student of their own ignorance.", attribution: "On the Practice of Instruction" },
  { text: "We do not teach what we know. We teach what we still wonder.", attribution: "Tutor's Reflection" },
  { text: "Every Pledge inherits the question we have not yet answered.", attribution: "Curator's Address" },
  { text: "To instruct is to admit that one's own learning is unfinished.", attribution: "From the Tutor's Compendium" },
  { text: "Truth is found in argument, not in silence.", attribution: "On the Practice of Discourse" },
  { text: "A debate well held is a record well kept.", attribution: "Symposium Notes" },
  { text: "We do not seek to be right. We seek to be less wrong.", attribution: "Maxim of the Debate Hall" },
  { text: "The pen that records the disagreement matters more than the voice that wins it.", attribution: "Inscription, Hall of Discourse" },
  { text: "By patience, by record, by light.", attribution: "Motto of the Order" },
  { text: "The archive was not built in haste, and shall not be read in haste.", attribution: "Saying of the Curators" },
  { text: "Slowness is the discipline of those who intend to remember.", attribution: "Reflection of an Archivist" },
  { text: "What burns quickly is rarely worth keeping.", attribution: "Apocrypha of the Sixth Hall" },
  { text: "We do not draw the saber first. We draw the record.", attribution: "Vigil's Creed" },
  { text: "An empty shelf is the first sign of a forgotten people.", attribution: "Historian's Warning" },
  { text: "To guard knowledge is to guard those who will need it after us.", attribution: "From the Vigil's Charter" },
  { text: "The Assembly serves the question, not the questioner.", attribution: "First Lesson of the Pledge" },
  { text: "The Force is not learned. It is studied without end.", attribution: "Saying of the Lore Keepers" },
  { text: "Light, like knowledge, multiplies when shared and dims when hoarded.", attribution: "Maxim of the First Curators" },
  { text: "We are the candles set in the long hall of the Order.", attribution: "Address to the Assembly" },
  { text: "Every answer is the doorway to a better question.", attribution: "Margin note, Untitled Codex" },
  { text: "The Galaxy is loud. The Archive is quiet. Both are necessary.", attribution: "Curator's Lament" },
  { text: "We are not the heroes of the story. We are the ones who see that it is told.", attribution: "Historian's Reflection" },
  { text: "What we record today, our successors will measure us by.", attribution: "Address to the Assembly" },
];

// Deterministic daily picker — every visitor sees the same passage on the same calendar date.
function dailyIndex() {
  const today = new Date();
  // Use UTC date so timezone differences don't roll the passage over an hour earlier/later.
  const epoch = Date.UTC(today.getUTCFullYear(), today.getUTCMonth(), today.getUTCDate());
  const days = Math.floor(epoch / (1000 * 60 * 60 * 24));
  return days % LORE_QUOTES.length;
}

const idx = dailyIndex();
const q = LORE_QUOTES[idx];
document.getElementById('reading-quote').textContent = q.text;
document.getElementById('reading-attribution').textContent = ', ' + q.attribution;

const today = new Date();
const opts = { year: 'numeric', month: 'long', day: 'numeric' };
document.getElementById('reading-date').textContent = today.toLocaleDateString('en-GB', opts);
</script>

<script>
(function initBackToTop() {
  const btn = document.getElementById('back-to-top');
  if (!btn) return;
  const SHOW_AFTER_PX = 480;
  let ticking = false;
  function update() {
    const y = window.scrollY || document.documentElement.scrollTop;
    btn.classList.toggle('visible', y > SHOW_AFTER_PX);
    ticking = false;
  }
  window.addEventListener('scroll', () => {
    if (!ticking) { window.requestAnimationFrame(update); ticking = true; }
  }, { passive: true });
  btn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  update();
})();
</script>


<script>
// Reveal-on-scroll for .fade-in elements
(function initFadeIn() {
  const els = document.querySelectorAll('.fade-in');
  if (els.length === 0) return;
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduce) { els.forEach(el => el.classList.add('in')); return; }
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('in'), i * 60);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });
  els.forEach(el => observer.observe(el));
})();
</script>
